name: Publish Merged Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-merged-main
  cancel-in-progress: false

jobs:
  openviking-runtime:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-15
            platform: darwin
            arch: arm64
            python_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.12.13%2B20260510-aarch64-apple-darwin-install_only_stripped.tar.gz
            python_sha256: 55bc1a5edbc8ac4da0081f4f5731ed2d1ed10c57cb37a820b2a0dbc7cad742e9
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            python_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.12.13%2B20260510-x86_64-apple-darwin-install_only_stripped.tar.gz
            python_sha256: 6bab7fa97d4f2ddba86da0e05acff66c53b5edaca1df8edcf00ddca785a9c59b
          - runner: windows-2025
            platform: win32
            arch: x64
            python_url: https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.12.13%2B20260510-x86_64-pc-windows-msvc-install_only_stripped.tar.gz
            python_sha256: 24168aff2e7d93784c6a436124c4ebb79b076a4e289bde4902c08333507b71d0
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect merged MR and release note
        id: merged
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
          MERGED_SHA: ${{ github.sha }}
        run: |
          pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${MERGED_SHA}/pulls" --jq '[.[] | select(.merged_at != null and .base.ref == "main")][0].number // empty')"
          if [ -z "$pr_number" ]; then
            echo "This main push is not associated with a merged MR; skipping application release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          note_file="$(git diff --name-only --diff-filter=A "$BEFORE_SHA" "$MERGED_SHA" -- .release-notes | grep -Ev '/README\.md$' | head -1)"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "note_file=$note_file" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.merged.outputs.publish == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Compute idempotent release version
        if: steps.merged.outputs.publish == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          NOTE_FILE: ${{ steps.merged.outputs.note_file }}
          MERGED_SHA: ${{ github.sha }}
        run: node scripts/compute-release-version.mjs

      - name: Install runtime build dependencies
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        run: npm ci

      - name: Build isolated OpenViking runtime
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        shell: bash
        env:
          BUILD_HOME: ${{ runner.temp }}/openviking-build-home
          OUTPUT_DIR: ${{ runner.temp }}/openviking-release
          PYTHON_URL: ${{ matrix.python_url }}
          PYTHON_SHA256: ${{ matrix.python_sha256 }}
        run: |
          node scripts/build-openviking-runtime.mjs \
            --version 0.4.11 \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --build-home "$BUILD_HOME" \
            --output-dir "$OUTPUT_DIR" \
            --python-url "$PYTHON_URL" \
            --python-sha256 "$PYTHON_SHA256"

      - name: Upload OpenViking runtime artifact
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: openviking-runtime-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/openviking-release/openviking-runtime-*
          if-no-files-found: error

  release:
    needs: openviking-runtime
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect merged MR and release note
        id: merged
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
          MERGED_SHA: ${{ github.sha }}
        run: |
          pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${MERGED_SHA}/pulls" --jq '[.[] | select(.merged_at != null and .base.ref == "main")][0].number // empty')"
          if [ -z "$pr_number" ]; then
            echo "This main push is not associated with a merged MR; skipping application release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t notes < <(git diff --name-only --diff-filter=A "$BEFORE_SHA" "$MERGED_SHA" -- .release-notes | grep -Ev '/README\.md$' || true)
          if [ "${#notes[@]}" -ne 1 ]; then
            echo "Expected exactly one added release note for merged MR #${pr_number}; found ${#notes[@]}." >&2
            exit 1
          fi
          node scripts/release-notes.mjs check-file "${notes[0]}"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "note_file=${notes[0]}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.merged.outputs.publish == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Compute idempotent release version
        if: steps.merged.outputs.publish == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          NOTE_FILE: ${{ steps.merged.outputs.note_file }}
          MERGED_SHA: ${{ github.sha }}
        run: node scripts/compute-release-version.mjs

      - name: Install dependencies
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        run: npm ci

      - name: Test and build
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Build release assets
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        id: assets
        env:
          NOTE_FILE: ${{ steps.merged.outputs.note_file }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release
          package_file="$(npm pack --pack-destination release | tail -1)"
          node scripts/create-release-assets.mjs \
            --note "$NOTE_FILE" \
            --version "$VERSION" \
            --package "release/$package_file" \
            --repository "$GITHUB_REPOSITORY" \
            --output release
          node scripts/create-release-assets.mjs \
            --validate \
            --version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --output release
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Download OpenViking runtime artifacts
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: openviking-runtime-*
          path: release
          merge-multiple: true

      - name: Verify OpenViking runtime artifacts
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        run: node scripts/verify-openviking-runtime-assets.mjs release 0.4.11

      - name: Create tag and GitHub Release
        if: steps.merged.outputs.publish == 'true' && steps.version.outputs.release_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          MERGED_SHA: ${{ github.sha }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$MERGED_SHA" -m "AgentRecall $TAG"
            git push origin "$TAG"
          fi
          if release_is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$release_is_draft" != "true" ]; then
              echo "Release $TAG already exists and is published; refusing to overwrite it."
              exit 1
            fi
            gh release edit "$TAG" --title "AgentRecall $TAG" --notes-file release/release-notes.md
          else
            gh release create "$TAG" --draft --verify-tag --title "AgentRecall $TAG" --notes-file release/release-notes.md
          fi
          gh release upload "$TAG" release/*.tgz release/*.sha256 release/update.json release/openviking-runtime-*.tar.gz release/openviking-runtime-*.tar.gz.json --clobber
          verify_directory="$(mktemp -d)"
          gh release download "$TAG" \
            --pattern "agent-recall-${VERSION}.tgz" \
            --pattern "agent-recall-${VERSION}.tgz.sha256" \
            --pattern "agent-recall.tgz" \
            --pattern "agent-recall.tgz.sha256" \
            --pattern "update.json" \
            --pattern "openviking-runtime-*" \
            --dir "$verify_directory"
          node scripts/create-release-assets.mjs \
            --validate \
            --version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --output "$verify_directory"
          node scripts/verify-openviking-runtime-assets.mjs "$verify_directory" 0.4.11
          gh release edit "$TAG" --draft=false
