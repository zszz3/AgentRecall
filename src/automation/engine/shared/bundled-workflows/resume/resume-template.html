<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{姓名}} - 简历</title>
<style>
  :root{ --ink:#1f2733; --muted:#5b6472; --line:#d9dee6; --accent:#0f766e; --paper:#fff; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#eef1f5; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    font-size:13.5px; line-height:1.55; }
  .page{ max-width:820px; margin:24px auto; background:var(--paper); padding:40px 44px; box-shadow:0 1px 8px rgba(0,0,0,.08); }
  header.top{ border-bottom:2px solid var(--accent); padding-bottom:10px; margin-bottom:16px; }
  .name{ font-size:26px; font-weight:800; letter-spacing:1px; }
  .contact{ margin-top:6px; color:var(--muted); font-size:12.5px; }
  .contact a{ color:var(--accent); text-decoration:none; }
  section{ margin-top:18px; }
  h2.sec{ font-size:15px; color:var(--accent); border-left:4px solid var(--accent); padding-left:8px; margin:0 0 10px; }
  .item{ margin-bottom:10px; }
  .item .row{ display:flex; justify-content:space-between; gap:12px; align-items:baseline; }
  .item .row .title{ font-weight:700; }
  .item .row .date{ color:var(--muted); font-size:12px; white-space:nowrap; }
  .role{ color:var(--muted); font-size:12.5px; margin:2px 0 4px; }
  .proj{ font-weight:700; margin:8px 0 4px; }
  ul{ margin:4px 0 0; padding-left:18px; }
  li{ margin:3px 0; }
  strong{ color:var(--ink); }
  @media print{ body{ background:#fff; } .page{ margin:0; box-shadow:none; max-width:none; padding:0 12mm; } }
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="name">{{姓名}}</div>
    <div class="contact">{{电话}} · {{邮箱}} · <a href="{{链接URL}}">{{链接文字}}</a> · {{目标岗位}} · {{性别}}</div>
  </header>

  <section>
    <h2 class="sec">教育背景</h2>
    <div class="item"><div class="row"><span class="title">{{学校}}，{{专业}}，{{学位}}</span><span class="date">{{起}} - {{止}}</span></div></div>
    <!-- 按需复制上面的 .item 容纳多条教育经历 -->
  </section>

  <section>
    <h2 class="sec">实习经历</h2>
    <div class="item">
      <div class="row"><span class="title">{{公司}}</span><span class="date">{{起}} - {{止}}</span></div>
      <div class="role">{{角色}} · {{业务或平台}}</div>
      <div class="proj">项目一：{{项目名}}</div>
      <ul>
        <li><strong>{{要点标题}}：</strong>{{要点描述，关键指标与技术词用 <strong>加粗</strong>}}</li>
      </ul>
    </div>
    <!-- 按需复制 .item / .proj / li -->
  </section>

  <section>
    <h2 class="sec">项目经历</h2>
    <div class="item">
      <!-- 有仓库/链接才保留括号里的 <a>，没有就删掉，只留项目名 -->
      <div class="row"><span class="title">{{项目名}}</span><span class="date">{{起}} - {{止}}</span></div>
      <ul><li><strong>{{要点标题}}：</strong>{{要点描述}}</li></ul>
    </div>
  </section>

  <section>
    <h2 class="sec">竞赛 &amp; 科研</h2>
    <div class="item"><div class="row"><span class="title">{{奖项或论文}}</span><span class="date">{{时间}}</span></div></div>
  </section>
</div>
</body>
</html>
